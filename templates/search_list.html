{% extends 'base.html' %}

{% block title %}Search{% endblock title %}

{% block content %}
    <h2>Search Results:</h2>
    {% for result in search_results %}
        <p><a href="{{ result.get_absolute_url }}">{{ result.title }}</a> | {{ result.intro }}</p>
    {% empty %}
        <p>Not Found</p>
    {% endfor %}
{% endblock content %}
